services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+psycopg2://w2flow:w2flow@db:5432/w2flow
      PSCP_PORTAL_BASE_URL: https://contractaciopublica.cat/portal-api
      LICITATION_API_TIMEOUT: "30"
      LICITATION_API_MAX_RETRIES: "2"
      DOWNLOAD_DIR: /app/downloads
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./downloads:/app/downloads
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8089"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: w2flow
      POSTGRES_USER: w2flow
      POSTGRES_PASSWORD: w2flow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U w2flow -d w2flow"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  postgres_data:
