services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: w2flow
      POSTGRES_USER: w2flow
      POSTGRES_PASSWORD: w2flow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U w2flow -d w2flow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
