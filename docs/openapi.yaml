openapi: 3.1.0

info:
  title: w2flow API
  description: API per a la descàrrega, filtrat i puntuació de licitacions públiques de contractaciopublica.cat
  version: 2.0.0

servers:
  - url: http://localhost:8089
    description: Desenvolupament local

tags:
  - name: pipeline
    description: Execució del pipeline de licitacions
  - name: filters
    description: Gestió de configuracions de filtre
  - name: tenders
    description: Consulta de licitacions persistides
  - name: documents
    description: Gestió de documents adjunts (descàrrega i eliminació)

paths:
  # ── Pipeline ────────────────────────────────────────────────────

  /api/v1/pipeline/run:
    post:
      tags: [pipeline]
      summary: Executa el pipeline complet
      description: |
        Obté la FilterConfig activa, descarrega licitacions, aplica filtres,
        analitza documents amb NLP (LiteLLM config-driven), puntua i persista
        a PostgreSQL. El pipeline s'executa en background task.
      responses:
        "202":
          description: Pipeline iniciat correctament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineStarted"
        "409":
          description: Ja hi ha un pipeline en execució
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No hi ha cap configuració de filtre activa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Error intern del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/pipeline/status:
    get:
      tags: [pipeline]
      summary: Estat del pipeline en curs
      description: Retorna l'estat actual del procés (RNF-01).
      responses:
        "200":
          description: Estat del pipeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineStatus"

  # ── Filters ─────────────────────────────────────────────────────

  /api/v1/filters:
    get:
      tags: [filters]
      summary: Historial de configuracions de filtre
      description: Retorna totes les configuracions ordenades de més recent a més antiga.
      responses:
        "200":
          description: Llista de configuracions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FilterConfig"

    post:
      tags: [filters]
      summary: Crea una nova configuració de filtre
      description: |
        Crea una nova FilterConfig i la marca com a activa.
        Desactiva automàticament qualsevol configuració activa anterior.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilterConfigRequest"
      responses:
        "201":
          description: Configuració creada i activada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterConfig"
        "422":
          description: Dades de la configuració invàlides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/filters/active:
    get:
      tags: [filters]
      summary: Retorna la configuració de filtre activa
      responses:
        "200":
          description: Configuració activa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterConfig"
        "404":
          description: No hi ha cap configuració activa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Tenders ─────────────────────────────────────────────────────

  /api/v1/tenders:
    get:
      tags: [tenders]
      summary: Llista de licitacions persistides
      description: Retorna totes les licitacions ja processades pel pipeline, ordenades per data_limit descendent.
      responses:
        "200":
          description: Llista de licitacions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tender"

  # ── Documents ───────────────────────────────────────────────────

  /api/v1/documents/{expedient_id}/{filename}/download:
    get:
      tags: [documents]
      summary: Descàrrega d'un document adjunt (RF-09)
      description: Serveix el PDF d'un document adjunt com a FileResponse.
      parameters:
        - name: expedient_id
          in: path
          required: true
          schema:
            type: string
          description: UUID de la licitació
        - name: filename
          in: path
          required: true
          schema:
            type: string
          description: Nom del fitxer PDF
      responses:
        "200":
          description: Fitxer PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Document no trobat a la BD o al disc
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/documents/{expedient_id}/{filename}:
    delete:
      tags: [documents]
      summary: Elimina un document adjunt
      description: Esborra el document de disc i de la base de dades.
      parameters:
        - name: expedient_id
          in: path
          required: true
          schema:
            type: string
          description: UUID de la licitació
        - name: filename
          in: path
          required: true
          schema:
            type: string
          description: Nom del fitxer PDF
      responses:
        "200":
          description: Document eliminat correctament
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Document eliminat correctament.
        "404":
          description: Document no trobat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

# ── Schemas ───────────────────────────────────────────────────────

components:
  schemas:
    TrafficLight:
      type: string
      enum: [green, yellow, red]
      description: "green ≥70 · yellow 40-69 · red <40"

    FilterConfigRequest:
      type: object
      required:
        - tipus_expedient
      properties:
        tipus_expedient:
          type: integer
          description: Tipus d'expedient (p.ex. 1 = obra, 2 = serveis)
        fase_vigent:
          type: integer
          default: 30
          description: >-
            Fase vigent de la licitació. 30 = Anunci de licitació en termini (RN-14).
            Valors vàlids: 0=Alerta futura, 30=Anunci licitació, 40=En avaluació,
            50=Adjudicació, 60=Formalització. Els IDs del catàleg de Dades Mestres
            (p.ex. 1000040) NO funcionen en aquest endpoint.
        ambit:
          type: integer
          nullable: true
          default: 1500001
          description: Àmbit geogràfic. 1500001 = Generalitat de Catalunya (RN-14)
        tipus_contracte:
          type: integer
          nullable: true
          default: 395
          description: Tipus de contracte. 395 = Obres (RN-14)
        procediment_adjudicacio:
          type: integer
          nullable: true
          default: 401
          description: Procediment d'adjudicació. 401 = Obert (RN-14)
        cpv_codes:
          type: array
          items:
            type: string
          default: []
          description: Codis CPV permesos. Buit = sense filtre (RN-07)
        pressupost_maxim:
          type: number
          default: 0.0
          description: Pressupost màxim en EUR. 0.0 = sense límit (RN-08)
        nuts_codes:
          type: array
          items:
            type: string
          default: []
          description: Codis NUTS permesos. Buit = sense filtre (RN-09)
        classifications:
          type: array
          items:
            type: string
          default: []
          description: Grups empresarials permesos. Buit = sense filtre (RN-10)
        durada_minima_dies:
          type: integer
          default: 0
          description: Durada mínima en dies. 0 = sense límit inferior (RN-11)
        durada_maxima_dies:
          type: integer
          default: 0
          description: Durada màxima en dies. 0 = sense límit superior (RN-11)
        max_licitacions:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
          description: Nombre màxim de licitacions a processar per execució (RN-13)

    FilterConfig:
      allOf:
        - $ref: "#/components/schemas/FilterConfigRequest"

    Tender:
      type: object
      properties:
        expedient_id:
          type: string
          description: Identificador únic de l'expedient (UUID)
        publicacio_id:
          type: integer
          description: Identificador numèric de la publicació
        organ:
          type: string
          description: Nom de l'òrgan de contractació
        titol:
          type: string
          description: Títol de la licitació
        codi_expedient:
          type: string
          nullable: true
          description: Codi intern assignat per l'òrgan
        pressupost:
          type: number
          nullable: true
          description: Pressupost base sense IVA en EUR
        cpv_principal:
          type: string
          nullable: true
          description: Codi CPV principal (p.ex. "45000000-7")
        data_limit:
          type: string
          format: date-time
          nullable: true
          description: Termini de presentació d'ofertes
        durada_dies:
          type: integer
          nullable: true
          description: Durada estimada en dies
        tipus_contracte_id:
          type: integer
          nullable: true
        procediment_id:
          type: integer
          nullable: true
        nuts_code:
          type: string
          nullable: true
          description: Codi NUTS del lloc d'execució (p.ex. "ES512")
        classifications:
          type: array
          items:
            type: string
          description: Grups de classificació empresarial requerits

    TenderDocument:
      type: object
      description: Document adjunt d'una licitació persistit a disc i BD (RF-09, J.1)
      properties:
        id:
          type: integer
          description: Clau primària autoincremental
        expedient_id:
          type: string
          description: UUID de la licitació (FK a tenders)
        filename:
          type: string
          description: Nom del fitxer PDF
        filepath:
          type: string
          description: Ruta relativa al disc (downloads/<expedient_id>/<filename>)
        comentari_llm:
          type: string
          nullable: true
          description: Comentari narratiu generat pel LLM per a aquest document (RF-10)
        created_at:
          type: string
          format: date-time
          description: Data de creació del registre

    ScoredTenderDTO:
      type: object
      properties:
        expedient_id:
          type: string
        titol:
          type: string
        organ:
          type: string
        pressupost:
          type: number
          nullable: true
        total:
          type: integer
          minimum: 0
          maximum: 100
          description: Puntuació total NLP
        traffic_light:
          $ref: "#/components/schemas/TrafficLight"
        detall:
          type: object
          description: Desglose de puntuació per criteri (RN-12)
          properties:
            solvencia:
              type: integer
              minimum: 0
              maximum: 30
            criteris_adjudicacio:
              type: integer
              minimum: 0
              maximum: 25
            clausules_atipiques:
              type: integer
              minimum: 0
              maximum: 20
            procediment:
              type: integer
              minimum: 0
              maximum: 15
            condicions_execucio:
              type: integer
              minimum: 0
              maximum: 10
        recomendacio:
          type: string
          nullable: true
          description: Recomanació global GO/NO GO generada pel LLM (RF-10, J.5)
        created_at:
          type: string
          format: date-time
          nullable: true
          description: Data de processament de la licitació pel pipeline (J.1)
        documents:
          type: array
          items:
            $ref: "#/components/schemas/TenderDocument"
          description: Documents adjunts descarregats i analitzats (RF-09, J.5)

    ReportDTO:
      type: object
      properties:
        tenders:
          type: array
          items:
            $ref: "#/components/schemas/ScoredTenderDTO"
          description: Totes les licitacions puntuades (viables i no viables)
        total_candidates:
          type: integer
          description: Nombre total de licitacions candidates processades
        total_viable:
          type: integer
          description: Nombre de licitacions amb puntuació >= 40

    PipelineStarted:
      type: object
      properties:
        message:
          type: string
          example: Pipeline iniciat
        started_at:
          type: string
          format: date-time

    PipelineStatus:
      type: object
      properties:
        state:
          type: string
          enum: [idle, running, completed, failed]
          description: Estat actual del pipeline
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
          description: Missatge d'error si state == failed

    Error:
      type: object
      properties:
        detail:
          type: string
          description: Descripció de l'error
