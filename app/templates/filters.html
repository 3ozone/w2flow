{% extends "base.html" %}
{% block title %}Filtres{% endblock %}

{% block content %}
<div class="max-w-2xl space-y-6">

  <h1 class="text-2xl font-bold text-gray-900">Configuració de filtres</h1>

  <!-- Success / error feedback (swapped por JS) -->
  <div id="filter-feedback"></div>

  <form id="filter-form" class="rounded-xl border bg-white shadow-sm p-6 space-y-6">

    <!-- tipus_expedient: fix 1 (licitacions i contractes) -->
    <input type="hidden" name="tipus_expedient" value="1" />

    <!-- fase_vigent: fix 30 (Anunci de licitació en termini, RN-14) -->
    <input type="hidden" name="fase_vigent" value="30" />

    <!-- max_licitacions (RN-13: 1–100) -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Màxim de licitacions per execució
        <span class="text-xs text-gray-400 font-normal">— mínim 1, màxim 100 (RN-13)</span>
      </label>
      <input type="number" name="max_licitacions" min="1" max="100" required
             value="{{ filter.max_licitacions if filter else 20 }}"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <!-- pressupost_maxim (RN-08) -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Pressupost màxim (€) <span class="text-xs text-gray-400 font-normal">— 0 = sense límit (RN-08)</span>
      </label>
      <input type="number" name="pressupost_maxim" min="0" step="1000"
             value="{{ filter.pressupost_maxim if filter else 0 }}"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <!-- cpv_codes (RN-07) -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Codis CPV <span class="text-xs text-gray-400 font-normal">— buit = sense filtre (RN-07)</span>
      </label>
      <input type="text" name="cpv_codes_raw"
             value="{{ filter.cpv_codes | join(', ') if filter else '' }}"
             placeholder="45000000-7, 71000000-8"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      <p class="mt-1 text-xs text-gray-400">
        Separa els codis per comes. Si s'omple, només passaran licitacions el CPV de les quals estigui a la llista.
      </p>
    </div>

    <!-- nuts_codes (RN-09) -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Codis NUTS <span class="text-xs text-gray-400 font-normal">— buit = sense filtre geogràfic (RN-09)</span>
      </label>
      <input type="text" name="nuts_codes_raw"
             value="{{ filter.nuts_codes | join(', ') if filter else '' }}"
             placeholder="ES511, ES512"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <!-- classifications (RN-10) -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Grups de classificació empresarial <span class="text-xs text-gray-400 font-normal">— buit = sense filtre (RN-10)</span>
      </label>
      <input type="text" name="classifications_raw"
             value="{{ filter.classifications | join(', ') if filter else '' }}"
             placeholder="C, G"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <!-- durada (RN-11) -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Durada mínima (dies) <span class="text-xs text-gray-400 font-normal">— 0 = sense límit (RN-11)</span>
        </label>
        <input type="number" name="durada_minima_dies" min="0"
               value="{{ filter.durada_minima_dies if filter else 0 }}"
               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Durada màxima (dies) <span class="text-xs text-gray-400 font-normal">— 0 = sense límit (RN-11)</span>
        </label>
        <input type="number" name="durada_maxima_dies" min="0"
               value="{{ filter.durada_maxima_dies if filter else 0 }}"
               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
    </div>

    <div class="flex items-center gap-4 pt-2">
      <button type="submit"
              class="rounded-lg bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 transition-colors">
        💾 Desar filtre
      </button>
      <a href="/" class="text-sm text-gray-400 hover:text-gray-600">Cancel·lar</a>
    </div>
  </form>

</div>

<script>
  document.getElementById('filter-form').addEventListener('submit', async function(evt) {
    evt.preventDefault();

    const payload = {
      tipus_expedient:         parseInt(document.querySelector('[name=tipus_expedient]').value, 10),
      fase_vigent:             parseInt(document.querySelector('[name=fase_vigent]').value, 10),
      max_licitacions:         parseInt(document.querySelector('[name=max_licitacions]').value, 10) || 20,
      pressupost_maxim:        parseFloat(document.querySelector('[name=pressupost_maxim]').value) || 0,
      cpv_codes:               (document.querySelector('[name=cpv_codes_raw]').value || '')
                                 .split(',').map(s => s.trim()).filter(s => s.length > 0),
      nuts_codes:              (document.querySelector('[name=nuts_codes_raw]').value || '')
                                 .split(',').map(s => s.trim()).filter(s => s.length > 0),
      classifications:         (document.querySelector('[name=classifications_raw]').value || '')
                                 .split(',').map(s => s.trim()).filter(s => s.length > 0),
      durada_minima_dies:      parseInt(document.querySelector('[name=durada_minima_dies]').value) || 0,
      durada_maxima_dies:      parseInt(document.querySelector('[name=durada_maxima_dies]').value) || 0,
    };

    try {
      const resp = await fetch('/api/v1/filters', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (resp.ok) {
        document.getElementById('filter-feedback').innerHTML =
          '<div class="rounded-md bg-green-50 border border-green-300 p-3 text-sm text-green-800">✅ Filtre desat correctament.</div>';
      } else {
        const err = await resp.text();
        document.getElementById('filter-feedback').innerHTML =
          '<div class="rounded-md bg-red-50 border border-red-300 p-3 text-sm text-red-800">❌ Error: ' + err + '</div>';
      }
    } catch(e) {
      document.getElementById('filter-feedback').innerHTML =
        '<div class="rounded-md bg-red-50 border border-red-300 p-3 text-sm text-red-800">❌ Error de connexió.</div>';
    }
  });
</script>
{% endblock %}
