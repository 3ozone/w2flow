{% extends "base.html" %}
{% block title %}Filtres{% endblock %}

{% block content %}
<div class="max-w-2xl space-y-6">

  <h1 class="text-2xl font-bold text-gray-900">Configuració de filtres</h1>

  <!-- Success / error feedback (swapped by HTMX) -->
  <div id="filter-feedback"></div>

  <form id="filter-form" class="rounded-xl border bg-white shadow-sm p-6 space-y-6">

    <!-- tipus_expedient -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Tipus d'expedient
        <span class="ml-1 text-xs text-gray-400">(0 = tots, 1 = licitació…)</span>
      </label>
      <input type="number" name="tipus_expedient" min="0" required
             value="{{ filter.tipus_expedient if filter else 1 }}"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <!-- fase_vigent -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Fase vigent
        <span class="ml-1 text-xs text-gray-400">(0 = obert)</span>
      </label>
      <input type="number" name="fase_vigent" min="0" required
             value="{{ filter.fase_vigent if filter else 0 }}"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <!-- max_results -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Màxim de resultats per execució
      </label>
      <input type="number" name="max_results" min="1" required
             value="{{ filter.max_results if filter else 20 }}"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <!-- min_pressupost -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Pressupost mínim (€)
      </label>
      <input type="number" name="min_pressupost" min="0" step="1000"
             value="{{ filter.min_pressupost if filter else 0 }}"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <!-- sector_keywords -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Keywords de sector
        <span class="ml-1 text-xs text-gray-400">(separats per comes)</span>
      </label>
      <input type="text" name="sector_keywords_raw"
             value="{{ filter.sector_keywords | join(', ') if filter else '' }}"
             placeholder="obra civil, pavimentació, xarxa…"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      <p class="mt-1 text-xs text-gray-400">S'envien com a llista JSON. Deixa buit per no filtrar per sector.</p>
    </div>

    <div class="flex items-center gap-4 pt-2">
      <button type="submit"
              class="rounded-lg bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 transition-colors">
        💾 Desar filtre
      </button>
      <a href="/" class="text-sm text-gray-400 hover:text-gray-600">Cancel·lar</a>
    </div>
  </form>

</div>

<!-- Submit form as JSON via fetch -->
<script>
  document.getElementById('filter-form').addEventListener('submit', async function(evt) {
    evt.preventDefault();
    const raw = document.querySelector('[name=sector_keywords_raw]').value || '';
    const keywords = raw.split(',').map(s => s.trim()).filter(s => s.length > 0);
    const payload = {
      tipus_expedient: parseInt(document.querySelector('[name=tipus_expedient]').value, 10),
      fase_vigent:     parseInt(document.querySelector('[name=fase_vigent]').value, 10),
      max_results:     parseInt(document.querySelector('[name=max_results]').value, 10),
      min_pressupost:  parseFloat(document.querySelector('[name=min_pressupost]').value) || 0,
      sector_keywords: keywords,
    };
    try {
      const resp = await fetch('/api/v1/filters', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (resp.ok) {
        document.getElementById('filter-feedback').innerHTML =
          '<div class="rounded-md bg-green-50 border border-green-300 p-3 text-sm text-green-800">✅ Filtre desat correctament.</div>';
      } else {
        const err = await resp.text();
        document.getElementById('filter-feedback').innerHTML =
          '<div class="rounded-md bg-red-50 border border-red-300 p-3 text-sm text-red-800">❌ Error desant el filtre: ' + err + '</div>';
      }
    } catch(e) {
      document.getElementById('filter-feedback').innerHTML =
        '<div class="rounded-md bg-red-50 border border-red-300 p-3 text-sm text-red-800">❌ Error de connexió.</div>';
    }
  });
</script>
{% endblock %}
